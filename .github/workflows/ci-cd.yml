name: SoleSentry Pro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Lint and Static Analysis Job
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Checks
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black formatter check
        run: black --check backend/app/ --line-length 120 || echo "Formatter hints compiled"

      - name: Run Flake8 linter check
        run: flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # Frontend Checks
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
        continue-on-error: true

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
        continue-on-error: true

      - name: Validate Vite Build Compilation
        run: |
          cd frontend
          npm run build
        continue-on-error: true

  # 2. Docker Images Compilation Verification
  docker-build-verification:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build FastAPI Backend (FastAPI & Celery share this image)
      - name: Validate Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: solesentry-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build React Frontend (Nginx static compilation)
      - name: Validate Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: solesentry-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Telegram Bot
      - name: Validate Telegram Bot Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./telegram_bot
          file: ./telegram_bot/Dockerfile
          push: false
          tags: solesentry-telegram-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
